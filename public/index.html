<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .search-bar {
      text-align: center;
    }

    .search-input {
      padding: 10px;
      font-size: 16px;
    }

    .search-button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="search-bar">
    <form action="/guardar" method="POST">
      <input type="text" name="datos" class="search-input" placeholder="Ingresa tu búsqueda">
      <button type="submit" class="search-button">Buscar</button>
    </form>
  </div>

</body>
</html>
